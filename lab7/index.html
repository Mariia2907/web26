<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 7 JS</title>
    <style>
        #elid {
            width: 50px;
            height: 50px;
            background-color: #ff5722;
            margin: 20px 0;
            transition: transform 0.4s ease-in-out;
        }
    </style>
</head>
<body>
<!-- завдання 1
Першим виоконається big.js оскільки не залежати від того який скрипт завантажується швидше вони виконаються послідовно
від першого до останього -->
<!-- завдання 2
2.1 x=5 (x= 1 +(2*2))
2.2 Так,alert зявиться через те що в js "0" означає не порожній рядок, і якщо він не порожній це означає значення
правдиве і умова if справцює-->

<h2>Знайти код</h2>
<input type="text" id="countyInput" placeholder="Введіть округ">
<button onclick="findCode()">Знайти код</button>
<div id="result"></div>

<h2>Реєстрація користувача</h2>
<form id="userForm">
    <input type="text" id="first_name" placeholder="Ім'я"><br><br>
    <input type="text" id="last_name" placeholder="Прізвище"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <button type="submit">Відправити</button>
</form>

<h2>Керування квадратом</h2>
<button id="btnLeft">Вліво</button>
<button id="btnRight">Вправо</button>
<div id="elid"></div>

<script>
    //завдання 2.3
    let admin;
    let name = "Василь";
    admin = name;
    console.log(admin)

    //завдання 3
    let counties = [];
    async function getCounties() {
        try {
            const response = await fetch("https://api.census.gov/data/2020/acs/acs5/profile?get=NAME&for=county:*");
            const data = await response.json();

            counties = data.slice(1).map(item => ({
                name: item[0],
                state: item[1],
                county: item[2]
            }));
        } catch (error) {
            console.log("Помилка:", error);
        }
    }

    function getCountyCode(countyName) {
        const found = counties.find(item => item.name === countyName);
        return found ? found.state + found.county : "Не знайдено";
    }

    function findCode() {
        const input = document.getElementById("countyInput").value;
        const code = getCountyCode(input);
        document.getElementById("result").textContent = code;
    }
    getCounties();

    //завдання 4
    document.getElementById("userForm").addEventListener("submit", function(event) {
        event.preventDefault();
        let fName = document.getElementById("first_name").value.trim();
        let lName = document.getElementById("last_name").value.trim();
        let email = document.getElementById("email").value.trim();
        if (!fName || !lName || !email) {
            alert("Помилка! Заповніть усі поля.");
        } else {
            alert(`Дані користувача:\nІм'я: ${fName}\nПрізвище: ${lName}\nEmail: ${email}`);
        }
    });

    //завдання 5
    const box = document.getElementById("elid");
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    let currentPosition = 0;
    btnRight.addEventListener("click", function() {
        currentPosition += 100;
        box.style.transform = `translateX(${currentPosition}px)`;
    });
    btnLeft.addEventListener("click", function() {
        currentPosition -= 100;
        box.style.transform = `translateX(${currentPosition}px)`;
    });
</script>
</body>
</html>
